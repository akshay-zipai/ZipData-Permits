version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#
#   LOCAL  (default — OpenAI backend):
#     cp .env.example .env  →  set ENVIRONMENT=local + OPENAI_API_KEY
#     docker compose up --build
#
#   PRODUCTION  (Bedrock backend):
#     cp .env.example .env  →  set ENVIRONMENT=production + AWS credentials
#     docker compose up --build
#
#   Frontend:  http://localhost:8501
#   API docs:  http://localhost:8000/docs
#   Health:    http://localhost:8000/health
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: permit-reno-api
    env_file: .env                 # single .env file drives local vs prod
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro        # live-reload data without rebuild
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Streamlit Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: permit-reno-frontend
    environment:
      - API_BASE_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  default:
    name: permit-reno-net
